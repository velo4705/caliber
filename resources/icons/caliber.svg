<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#3f51b5"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#82b1ff"/>
      <stop offset="100%" style="stop-color:#e8eaf6"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect x="8" y="8" width="496" height="496" rx="90" ry="90"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Graph grid lines (subtle) -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="1.5">
    <line x1="256" y1="80"  x2="256" y2="432"/>
    <line x1="80"  y1="256" x2="432" y2="256"/>
    <line x1="168" y1="80"  x2="168" y2="432"/>
    <line x1="344" y1="80"  x2="344" y2="432"/>
    <line x1="80"  y1="168" x2="432" y2="168"/>
    <line x1="80"  y1="344" x2="432" y2="344"/>
  </g>

  <!-- Sine curve — glowing accent -->
  <path d="M 80 256
           C 110 256, 120 160, 168 160
           C 216 160, 226 352, 256 352
           C 286 352, 296 160, 344 160
           C 392 160, 402 256, 432 256"
        fill="none"
        stroke="url(#accentGrad)"
        stroke-width="14"
        stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- X axis arrow -->
  <line x1="80" y1="256" x2="420" y2="256"
        stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="432,256 416,248 416,264"
           fill="rgba(255,255,255,0.25)"/>

  <!-- Y axis arrow -->
  <line x1="256" y1="432" x2="256" y2="92"
        stroke="rgba(255,255,255,0.25)" stroke-width="3" stroke-linecap="round"/>
  <polygon points="256,80 248,96 264,96"
           fill="rgba(255,255,255,0.25)"/>

  <!-- Small dot at origin -->
  <circle cx="256" cy="256" r="6" fill="rgba(255,255,255,0.4)"/>
</svg>
